<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <title>
            youtube.com
        </title>
        <style>
            p{
                font-family: Roboto, Arial;
            }
         .thumbnail{
            width:300px;
         }
            .search-box{
                width:300px;
                display: block;
             }
            
            
            .video-author{
                font-size:12px;
                color:grey;
                margin-bottom: 0px;
            }
            .video-stats{
                margin-top:0px;
                display:inline-block;
                margin-bottom:0px;
                font-size:12px;
                color:grey;
                
            }
            .video-title{
                margin-top:0px;
                font-size:14px;
                font-weight: 500;
                margin-bottom:10px;

            }
            .video-preview{

                width:300px;
                display: inline-block;
                vertical-align:top;
                margin-right:15px;
                
             }
             .channel-logo{
                display:inline-block;
                width:50px;
                vertical-align: top;
                
             }
             .video-info{
                display:inline-block;
                width:200px;

             }
            .profile-pic{
                width:40px;
                border-radius:50%;
                
            }
            .thumbnail-row{
                margin-bottom:12px;
            }
        </style>
    </head>
    <body>
       <input class="search-box" type="textbox" placeholder="search"> 
        <div class="video-preview">
            <div class="thumbnail-row">
             <img src="thumbnails/thumbnail-1.webp" class="thumbnail">
            </div>
            <div>
                <div class="channel-logo">
                 <img class="profile-pic"  src="channel-logos/channel-1.jpeg ">
                </div>
                <div class="video-info">
                    <p class="video-title">
                 Talking Tech and AI with Google CEO Sundar Pichai!
                </p>
                <p class="video-author">
                   Marques Brownlee
                </p >
                <p class="video-stats">
                    3.4M views &#183; 6 months ago
                </p>

                </div>
            </div>
            </div>
                

            
        <div class="video-preview">
            <div class="thumbnail-row">
             <img src="thumbnails/thumbnail-2.webp" class="thumbnail">
            </div>
            <div>
                <div class="channel-logo">
                 <img class="profile-pic"  src="channel-logos/channel-2.jpeg ">
                </div>
                <div class="video-info">
                    <p class="video-title">
                 Try Not To Laugh Challenge #9
                </p>
                <p class="video-author">
                   Markiplier
                </p >
                <p class="video-stats">
                    19M views &#183; 4 years ago
                </p>

                </div>
            </div>
        </div>    
                
                

            
         
         
    </body>

</html>
