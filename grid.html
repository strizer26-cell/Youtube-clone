<!DOCTYPE html>
<html>
        <head>
            <title>grid prac</title>
        </head>
        <body>
            <div style="
            
                display: grid;
                grid-template-columns: 100px 100px 200px;
                ">
                <div style="background-color:lightblue">div1</div>
                <div style="background-color:lightpink">div2 <p>next</p></div>
            </div>
                <div style="
                  margin-top: 30px;
                    display: grid;
                    grid-template-columns: 100px 1fr;
                    ">
                    <div style="background-color:lightblue">div1</div>
                    <div style="background-color:lightpink">div2 <p>next</p></div>
                
                </div> 

            </body>
    </html>
